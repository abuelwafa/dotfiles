# job
apiVersion: batch/v1
kind: Job
metadata:
  name: ___
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: ___
          image: busybox:1.28
          command:
            - "sh"
            - "-c"
            - "echo \"hello kubernets\" && sleep 30"
            # command: ['python3', 'some-script.py']

---
# cronjob
apiVersion: batch/v1
kind: Job
metadata:
  name: ___
spec:
  schedule: "* * * * *"
  jobTemplate:
    # job template without name or api version
    spec:
      template:
        spec:
          containers:
            - name: ___
              restartPolicy: OnFailure
              image: ___
              imagePullPolicy: IfNotPresent
              command:
                - "python3"
                - "some-script.py'"

